<script>
/* Tự cập nhật bản mới — an toàn: chỉ tự tải lại khi RẢNH (không modal/không ô nhập đang có chữ, 10s không thao tác).
   Đang bận thì hiện nút "Cập nhật ngay". Phát hiện bản mới qua ETag/Last-Modified của index.html + service worker "waiting". */
(function(){
  "use strict";
  var swReg=null, pendingUpdate=false, refreshing=false, applying=false, baseTag=null, lastActivity=Date.now();
  ['pointerdown','keydown','touchstart','mousedown','click','input','wheel','scroll'].forEach(function(ev){
    window.addEventListener(ev, function(){ lastActivity=Date.now(); }, {passive:true, capture:true});
  });
  function anyInputFilled(){
    var a=document.activeElement;
    if(a&&(a.tagName==='INPUT'||a.tagName==='TEXTAREA'||a.isContentEditable)){
      if(a.isContentEditable)return true; if(a.value&&String(a.value).trim()!=='')return true; }
    var nodes=document.querySelectorAll('input, textarea');
    for(var i=0;i<nodes.length;i++){ var el=nodes[i]; if(el.offsetParent===null)continue;
      var t=(el.type||'').toLowerCase();
      if(t==='hidden'||t==='checkbox'||t==='radio'||t==='button'||t==='submit'||t==='range')continue;
      if(el.value&&String(el.value).trim()!=='')return true; }
    return false;
  }
  function appBusy(){ if(Date.now()-lastActivity<10000)return true; if(anyInputFilled())return true;
    try{ if(window.TS&&window.TS.modalOpen)return true; }catch(e){} return false; }
  function showUpdateBar(){
    if(document.getElementById('pwaUpdateBar'))return;
    var bar=document.createElement('div'); bar.id='pwaUpdateBar'; bar.setAttribute('role','status');
    bar.style.cssText="position:fixed;left:12px;right:12px;bottom:14px;z-index:99999;background:#12201B;border:1px solid #2F4C3E;color:#EAF2EE;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.4);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;";
    var t=document.createElement('span'); t.style.cssText="flex:1;line-height:1.35;"; t.textContent="✨ Đã có bản mới — sẽ tự cập nhật khi anh xong.";
    var b=document.createElement('button'); b.textContent="Cập nhật ngay";
    b.style.cssText="background:#45B08F;color:#06120E;border:none;border-radius:8px;padding:8px 15px;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap;";
    b.onclick=function(){ b.disabled=true; b.textContent="Đang cập nhật…"; applyUpdate(true); };
    var x=document.createElement('button'); x.textContent="✕"; x.setAttribute('aria-label','Để sau');
    x.style.cssText="background:transparent;color:#A9BEB4;border:none;font-size:16px;line-height:1;cursor:pointer;padding:4px 2px;";
    x.onclick=function(){ bar.remove(); };
    bar.appendChild(t); bar.appendChild(b); bar.appendChild(x); document.body.appendChild(bar);
  }
  function applyUpdate(force){
    if(applying)return;
    try{ if(baseTag&&sessionStorage.getItem('tro_applied_tag')===baseTag&&!(swReg&&swReg.waiting)){ pendingUpdate=false; return; } }catch(e){}
    applying=true;
    try{ if(baseTag)sessionStorage.setItem('tro_applied_tag',baseTag); }catch(e){}
    var did=false;
    if(swReg&&swReg.waiting){ try{ swReg.waiting.postMessage('SKIP_WAITING'); did=true; }catch(e){} }
    setTimeout(function(){ if(!refreshing){ refreshing=true; window.location.reload(); } }, did?1200:250);
  }
  function maybeApply(){ if(!pendingUpdate)return; if(appBusy()){ showUpdateBar(); return; } applyUpdate(false); }
  function readTag(r){ return r?(r.headers.get('ETag')||r.headers.get('Last-Modified')||null):null; }
  function fetchTag(){ return fetch('./index.html',{method:'HEAD',cache:'no-store'})
    .then(function(r){ return (r&&r.ok)?readTag(r):null; }).catch(function(){ return null; }); }
  function checkForUpdate(){ if(document.hidden)return;
    if(swReg&&swReg.update){ try{ swReg.update(); }catch(e){} }
    fetchTag().then(function(tag){ if(tag){ if(baseTag===null)baseTag=tag; else if(tag!==baseTag)pendingUpdate=true; }
      if(swReg&&swReg.waiting)pendingUpdate=true; maybeApply(); }); }
  if('serviceWorker' in navigator){
    navigator.serviceWorker.addEventListener('controllerchange', function(){
      pendingUpdate=true; if(appBusy()){ showUpdateBar(); return; }
      if(!refreshing){ refreshing=true; window.location.reload(); } });
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('./sw.js').then(function(reg){ swReg=reg;
        if(reg.waiting&&navigator.serviceWorker.controller)pendingUpdate=true;
        reg.addEventListener('updatefound', function(){ var nw=reg.installing; if(!nw)return;
          nw.addEventListener('statechange', function(){ if(nw.state==='installed'&&navigator.serviceWorker.controller){ pendingUpdate=true; maybeApply(); } }); });
      }).catch(function(){});
    });
  }
  window.addEventListener('load', function(){ fetchTag().then(function(tag){ if(tag)baseTag=tag;
    try{ var ap=sessionStorage.getItem('tro_applied_tag'); if(ap&&baseTag&&ap!==baseTag)sessionStorage.removeItem('tro_applied_tag'); }catch(e){} }); });
  setInterval(checkForUpdate, 60000);
  setInterval(function(){ if(pendingUpdate)maybeApply(); }, 3000);
  document.addEventListener('visibilitychange', function(){ if(!document.hidden)checkForUpdate(); });
  window.addEventListener('online', checkForUpdate);
})();

</script>

<script>
/* ============================================================
   NÚT CÀI ĐẶT APP (PWA) v2 — an toàn tuyệt đối với app đang chạy
   - KHÔNG dùng nút nổi (tránh đè lên nút sẵn có của app).
   - Gắn 1 nút nhỏ 📲 vào CHÍNH thanh header của app (đúng chỗ).
   - Thanh gợi ý trên cùng: TỰ ẨN sau 10 giây -> không bao giờ
     che nút header của app.
   - Bắt beforeinstallprompt (vẫn bắn dù khách đã tắt thanh Chrome).
   Không đụng bất kỳ biến / class / id nào của app.
   ============================================================ */
(function(){
  'use strict';
  if (window.__TSI__) return; window.__TSI__ = 1;

  /* Chỉ chạy khi mở bằng link web (http/https). Mở file rời trong máy -> im lặng. */
  try{ if (location && location.protocol && !/^https?:$/.test(location.protocol)) return; }catch(e){}

  var dp = null;                       // sự kiện beforeinstallprompt đã bắt được
  var UA = navigator.userAgent || '';
  var isIOS = /iPhone|iPad|iPod/i.test(UA) ||
              (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  var isAndroid = /Android/i.test(UA);
  var SKEY = 'tsi_seen_v2';
  var AUTOHIDE = 10000;                // thanh tự ẩn sau 10 giây

  function installed(){
    try{
      if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) return true;
      if (window.matchMedia && window.matchMedia('(display-mode: fullscreen)').matches) return true;
      if (window.navigator.standalone === true) return true;
      if (document.referrer && document.referrer.indexOf('android-app://') === 0) return true;
    }catch(e){}
    return false;
  }
  function seen(){ try{ return sessionStorage.getItem(SKEY) === '1'; }catch(e){ return false; } }
  function markSeen(){ try{ sessionStorage.setItem(SKEY, '1'); }catch(e){} }

  /* ---------- CSS (tiền tố tsi- , không đụng class app) ---------- */
  function css(){
    if (document.getElementById('tsi-css')) return;
    var s = document.createElement('style'); s.id = 'tsi-css';
    s.textContent =
    '.tsi-bar{position:fixed;left:0;right:0;top:0;z-index:2147482000;'+
      'background:linear-gradient(135deg,#16231E,#0E1613);border-bottom:2px solid #45B08F;'+
      'color:#E8F0EC;font:600 14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;'+
      'padding:calc(9px + env(safe-area-inset-top,0px)) 12px 9px;display:flex;align-items:center;gap:10px;'+
      'box-shadow:0 6px 24px rgba(0,0,0,.45);transform:translateY(-110%);transition:transform .35s cubic-bezier(.2,.8,.2,1)}'+
    '.tsi-bar.on{transform:translateY(0)}'+
    '.tsi-ico{width:32px;height:32px;flex:none;border-radius:9px;display:grid;place-items:center;font-size:18px;'+
      'background:rgba(69,176,143,.16);border:1px solid #2E4A3E}'+
    '.tsi-tx{flex:1;min-width:0}'+
    '.tsi-tx b{display:block;font-size:13.5px;color:#6FD3B4}'+
    '.tsi-tx span{display:block;font-size:11px;color:#9DB3AA;font-weight:500}'+
    '.tsi-go{flex:none;border:none;border-radius:9px;padding:9px 14px;cursor:pointer;'+
      'font:800 13.5px/1 -apple-system,system-ui,Arial,sans-serif;color:#04140e;background:linear-gradient(135deg,#45B08F,#2F8F72)}'+
    '.tsi-x{flex:none;border:none;background:transparent;color:#6F8A80;font-size:21px;cursor:pointer;padding:2px 5px;line-height:1}'+
    '.tsi-hb{display:inline-flex;align-items:center;justify-content:center;gap:5px;flex:none;'+
      'border:1px solid currentColor;background:transparent;color:inherit;border-radius:8px;'+
      'padding:6px 9px;cursor:pointer;opacity:.88;'+
      'font-family:inherit;font-size:12.5px;font-weight:700;line-height:1;white-space:nowrap}'+
    '.tsi-hb:hover{opacity:1}'+
    '.tsi-ov{position:fixed;inset:0;z-index:2147482500;background:rgba(0,0,0,.66);display:none;'+
      'align-items:center;justify-content:center;padding:16px}'+
    '.tsi-ov.on{display:flex}'+
    '.tsi-md{width:100%;max-width:380px;background:#16231E;border:1px solid #243A31;border-radius:16px;padding:20px;'+
      'color:#E8F0EC;font:400 14px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;'+
      'max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}'+
    '.tsi-md h3{margin:0 0 4px;font-size:17px;color:#6FD3B4}'+
    '.tsi-md .tsi-sub{color:#9DB3AA;font-size:12.5px;margin-bottom:14px}'+
    '.tsi-st{display:flex;gap:10px;align-items:flex-start;background:#0E1613;border:1px solid #243A31;'+
      'border-radius:10px;padding:10px 12px;margin-bottom:8px}'+
    '.tsi-st i{flex:none;width:22px;height:22px;border-radius:50%;background:#45B08F;color:#04140e;'+
      'font:800 12px/22px sans-serif;text-align:center;font-style:normal}'+
    '.tsi-st div{font-size:13.5px}'+
    '.tsi-note{background:rgba(201,162,75,.1);border:1px solid #C9A24B;border-radius:10px;padding:10px 12px;'+
      'color:#E4C878;font-size:12.5px;margin-top:10px}'+
    '.tsi-close{width:100%;margin-top:14px;border:none;border-radius:10px;padding:12px;cursor:pointer;'+
      'font:800 14px/1 -apple-system,system-ui,Arial,sans-serif;color:#04140e;background:linear-gradient(135deg,#45B08F,#2F8F72)}';
    (document.head || document.documentElement).appendChild(s);
  }

  /* ---------- Gắn nút vào HEADER của app (không đè, không phá bố cục) ---------- */
  function headerHost(){
    var h = null;
    try{ h = document.querySelector('header, .topbar, .app-header'); }catch(e){ return null; }
    if (!h) return null;
    var kids = [];
    try{ kids = Array.prototype.slice.call(h.children || []); }catch(e){}
    var last = kids.length ? kids[kids.length - 1] : null;
    /* Ô cuối là DIV/SPAN chứa sẵn nút VÀ không có id (app không render lại)
       -> bỏ nút vào trong đó (đúng như hàng nút của Sổ Nợ). */
    if (last && last.tagName && /^(DIV|SPAN)$/.test(last.tagName) && !last.id &&
        last.querySelector && last.querySelector('button')) return last;
    /* Ngược lại: gắn thẳng vào header, đứng cuối hàng. */
    return h;
  }
  function headBtn(){
    if (installed()) return;
    if (document.getElementById('tsi-hb')) return;
    var host = headerHost(); if (!host) return;
    css();
    var b = document.createElement('button');
    b.id = 'tsi-hb'; b.className = 'tsi-hb'; b.type = 'button';
    b.title = 'Cài App vào máy — dùng nhanh, chạy cả khi mất mạng';
    b.textContent = '📲 Cài App';
    b.onclick = function(ev){ if (ev && ev.stopPropagation) ev.stopPropagation(); doInstall(); };
    try{ host.appendChild(b); }catch(e){}
  }
  function killHeadBtn(){ var b = document.getElementById('tsi-hb'); if (b && b.parentNode) b.parentNode.removeChild(b); }

  /* ---------- Thanh gợi ý trên cùng (TỰ ẨN sau 10s) ---------- */
  var hideT = null;
  function bar(){
    if (installed() || seen()) return;
    if (document.getElementById('tsi-bar')) return;
    css(); markSeen();
    var d = document.createElement('div'); d.className = 'tsi-bar'; d.id = 'tsi-bar';
    d.innerHTML =
      '<div class="tsi-ico">📲</div>'+
      '<div class="tsi-tx"><b>Cài App vào máy</b><span>Mở nhanh từ màn hình chính · chạy cả khi mất mạng</span></div>'+
      '<button class="tsi-go" id="tsi-go" type="button">Cài đặt</button>'+
      '<button class="tsi-x" id="tsi-x" type="button" title="Để sau">×</button>';
    document.body.appendChild(d);
    setTimeout(function(){ d.classList.add('on'); }, 350);
    document.getElementById('tsi-go').onclick = function(){ killBar(); doInstall(); };
    document.getElementById('tsi-x').onclick = killBar;
    hideT = setTimeout(killBar, AUTOHIDE);     // tự ẩn -> KHÔNG che header của app
  }
  function killBar(){
    if (hideT){ clearTimeout(hideT); hideT = null; }
    var d = document.getElementById('tsi-bar');
    if (!d) return;
    d.classList.remove('on');
    setTimeout(function(){ if (d.parentNode) d.parentNode.removeChild(d); }, 400);
  }

  /* ---------- Hướng dẫn cài tay (iOS / trình duyệt chưa sẵn sàng) ---------- */
  function sheet(){
    css();
    var old = document.getElementById('tsi-ov'); if (old && old.parentNode) old.parentNode.removeChild(old);
    var title, steps, note;
    if (isIOS){
      title = 'Cài App trên iPhone / iPad';
      steps =
        '<div class="tsi-st"><i>1</i><div>Bấm nút <b>Chia sẻ</b> (ô vuông có mũi tên ↑) ở thanh dưới của <b>Safari</b>.</div></div>'+
        '<div class="tsi-st"><i>2</i><div>Kéo xuống, chọn <b>“Thêm vào MH chính”</b>.</div></div>'+
        '<div class="tsi-st"><i>3</i><div>Bấm <b>Thêm</b> ở góc trên bên phải. Xong!</div></div>';
      note = '⚠️ Phải mở bằng <b>Safari</b> (Chrome trên iOS: menu ⋯ → Thêm vào MH chính).';
    } else if (isAndroid){
      title = 'Cài App trên Android';
      steps =
        '<div class="tsi-st"><i>1</i><div>Bấm <b>⋮</b> (3 chấm) góc trên bên phải <b>Chrome</b>.</div></div>'+
        '<div class="tsi-st"><i>2</i><div>Chọn <b>“Thêm vào Màn hình chính”</b> hoặc <b>“Cài đặt ứng dụng”</b>.</div></div>'+
        '<div class="tsi-st"><i>3</i><div>Bấm <b>Cài đặt / Thêm</b> để xác nhận.</div></div>';
      note = '💡 Không thấy mục đó? Kéo tải lại trang rồi thử lại, và nhớ mở bằng <b>Chrome</b> (không phải trình duyệt trong Facebook/Zalo).';
    } else {
      title = 'Cài App trên máy tính';
      steps =
        '<div class="tsi-st"><i>1</i><div>Ở <b>thanh địa chỉ</b>, bấm biểu tượng <b>cài đặt</b> (màn hình có mũi tên ⤓ / dấu ⊕) bên phải.</div></div>'+
        '<div class="tsi-st"><i>2</i><div>Không thấy? Bấm <b>⋮</b> → <b>“Truyền, lưu và chia sẻ”</b> → <b>“Cài đặt trang này dưới dạng ứng dụng”</b>.</div></div>'+
        '<div class="tsi-st"><i>3</i><div>Bấm <b>Cài đặt</b>.</div></div>';
      note = '💡 Dùng <b>Chrome</b>, <b>Edge</b> hoặc <b>Cốc Cốc</b>. Firefox máy tính không cài được App.';
    }
    var ov = document.createElement('div'); ov.className = 'tsi-ov on'; ov.id = 'tsi-ov';
    ov.innerHTML =
      '<div class="tsi-md">'+
        '<h3>📲 '+title+'</h3>'+
        '<div class="tsi-sub">Cài xong: mở như app thật, không còn thanh trình duyệt, dùng được khi mất mạng.</div>'+
        steps+
        '<div class="tsi-note">'+note+'</div>'+
        '<button class="tsi-close" id="tsi-ok" type="button">Đã hiểu</button>'+
      '</div>';
    document.body.appendChild(ov);
    ov.onclick = function(e){ if (e.target === ov && ov.parentNode) ov.parentNode.removeChild(ov); };
    document.getElementById('tsi-ok').onclick = function(){ if (ov.parentNode) ov.parentNode.removeChild(ov); };
  }

  /* ---------- Bấm "Cài đặt" ---------- */
  function doInstall(){
    if (dp){
      var e = dp; dp = null;
      try{
        e.prompt();
        if (e.userChoice && e.userChoice.then){
          e.userChoice.then(function(r){
            if (r && r.outcome === 'accepted') killHeadBtn();   // đã cài -> gỡ nút
          }).catch(function(){});
        }
      }catch(err){ sheet(); }
      return;
    }
    sheet();                                   // iOS / chưa sẵn sàng -> hướng dẫn tay
  }
  window.tsInstallApp = doInstall;             // gọi tay bất cứ lúc nào

  /* ---------- Sự kiện trình duyệt ---------- */
  window.addEventListener('beforeinstallprompt', function(e){
    if (e && e.preventDefault) e.preventDefault();
    dp = e;
    if (installed()) return;
    headBtn();                                 // nút trong header: LUÔN CÒN
    bar();                                     // thanh gợi ý: 1 lần/phiên, tự ẩn
  });
  window.addEventListener('appinstalled', function(){
    dp = null; killBar(); killHeadBtn();
  });

  /* iOS không có beforeinstallprompt -> tự gắn nút + thanh sau khi app dựng xong */
  function boot(){
    if (installed()) return;
    if (isIOS){ headBtn(); bar(); }
  }
  if (document.readyState === 'complete' || document.readyState === 'interactive') setTimeout(boot, 1500);
  else window.addEventListener('DOMContentLoaded', function(){ setTimeout(boot, 1500); });
})();
</script>
