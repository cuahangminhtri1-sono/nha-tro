const SVC_TYPES={metered:'Theo chỉ số (công tơ)',per_person:'Theo đầu người',per_vehicle:'Theo số xe',per_room:'Cố định / phòng',per_unit:'Nhập số lượng khi lập HĐ'};
function viewServices(v){
  $('#topActions').innerHTML=`<button class="btn btn-primary" onclick="editService()"><span class="ic">＋</span>Thêm dịch vụ</button>`;
  const svc=DB.all('services');
  if(!svc.length){ v.innerHTML=emptyState('⚙','Chưa có dịch vụ','Cấu hình điện, nước, internet, giữ xe… với đơn giá để tính tiền tự động.',
    `<button class="btn btn-primary" onclick="editService()">＋ Thêm dịch vụ</button>`); return; }
  v.innerHTML=`<div class="info-box">ℹ Các dịch vụ này sẽ tự động được đưa vào hóa đơn. Loại "theo chỉ số" (điện/nước) sẽ lấy số công tơ; "theo đầu người" nhân số người ở; "theo số xe" nhân số xe.</div>
    <div class="grid g3">${svc.map(s=>`<div class="card" style="padding:16px">
      <div style="display:flex;align-items:center;gap:11px">
        <div style="width:42px;height:42px;border-radius:11px;background:var(--jade-glow);display:grid;place-items:center;font-size:20px;flex:0 0 42px">${s.icon||'⚙'}</div>
        <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:15px">${esc(s.name)}</div>
          <div class="badge-s b-dim" style="margin-top:3px;font-size:10px">${SVC_TYPES[s.type]||s.type}</div></div>
        <button class="btn btn-icon btn-ghost btn-sm" onclick="editService('${s.id}')">✎</button></div>
      <div style="margin-top:14px;display:flex;align-items:baseline;gap:6px">
        <span class="gold" style="font-size:20px;font-weight:800">${fmt(s.unitPrice)}đ</span>
        <span class="t-dim">/ ${esc(s.unit||'đơn vị')}</span></div>
    </div>`).join('')}</div>`;
}
function editService(id){
  const s=id?DB.byId('services',id):{name:'',type:'per_room',unit:'',unitPrice:'',icon:''};
  openModal(`
    <div class="modal-head"><h3>${id?'Sửa dịch vụ':'Thêm dịch vụ'}</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-row fr2">
        <div class="field"><label>Tên dịch vụ <span class="req">*</span></label><input class="inp" id="sName" value="${esc(s.name)}" placeholder="VD: Điện"></div>
        <div class="field"><label>Icon (emoji)</label><input class="inp" id="sIcon" value="${esc(s.icon||'')}" placeholder="⚡" maxlength="2"></div>
      </div>
      <div class="field"><label>Cách tính <span class="req">*</span></label>
        <select class="inp" id="sType">${Object.entries(SVC_TYPES).map(([k,l])=>`<option value="${k}"${s.type===k?' selected':''}>${l}</option>`).join('')}</select></div>
      <div class="form-row fr2">
        <div class="field"><label>Đơn vị</label><input class="inp" id="sUnit" value="${esc(s.unit||'')}" placeholder="kWh / m³ / người / xe"></div>
        <div class="field"><label>Đơn giá <span class="req">*</span></label><div class="inp-suffix"><input class="inp" id="sPrice" type="number" value="${s.unitPrice||''}"><span class="sfx">đ</span></div></div>
      </div>
    </div>
    <div class="modal-foot">
      ${id?`<button class="btn btn-danger" style="margin-right:auto" onclick="delService('${id}')">Xoá</button>`:''}
      <button class="btn btn-ghost" onclick="closeModal()">Huỷ</button>
      <button class="btn btn-primary" onclick="saveService('${id||''}')">Lưu</button>
    </div>`);
  setTimeout(()=>$('#sName').focus(),50);
}
async function saveService(id){ const name=$('#sName').value.trim(); if(!name){toast('Nhập tên dịch vụ','warn');return;}
  const s=id?DB.byId('services',id):{}; if(id)s.id=id;
  Object.assign(s,{name,type:$('#sType').value,unit:$('#sUnit').value.trim(),unitPrice:parseNum($('#sPrice').value),icon:$('#sIcon').value.trim()});
  await DB.put('services',s); closeModal(); toast('Đã lưu dịch vụ'); markCl('service'); viewServices($('#view')); }
async function delService(id){ if(await confirmDlg({title:'Xoá dịch vụ?',msg:'Hóa đơn cũ vẫn giữ nguyên.',danger:true,okText:'Xoá'})){
  await DB.del('services',id); closeModal(); toast('Đã xoá'); viewServices($('#view')); } }

/* ============================================================
   GHI ĐIỆN NƯỚC (Meters) — nhập hàng loạt theo kỳ
   ============================================================ */
TS.meterState={building:'all',period:nowMonth(),service:null};
function viewMeters(v){
  const metered=DB.where('services',s=>s.type==='metered');
  if(!metered.length){ v.innerHTML=emptyState('⚡','Chưa có dịch vụ theo chỉ số','Thêm dịch vụ "Điện" và "Nước" (loại theo chỉ số) để nhập công tơ.',
    `<button class="btn btn-primary" onclick="go('services')">Cấu hình dịch vụ</button>`); return; }
  if(!TS.meterState.service||!metered.find(s=>s.id===TS.meterState.service))TS.meterState.service=metered[0].id;
  const bs=DB.all('buildings'); const ms=TS.meterState;
  v.innerHTML=`
    <div class="filter-bar">
      <div class="tabs">${metered.map(s=>`<button class="${ms.service===s.id?'active':''}" onclick="TS.meterState.service='${s.id}';viewMeters($('#view'))">${s.icon||'⚡'} ${esc(s.name)}</button>`).join('')}</div>
      <select class="inp" style="max-width:180px" onchange="TS.meterState.building=this.value;viewMeters($('#view'))">
        <option value="all"${ms.building==='all'?' selected':''}>Tất cả dãy</option>
        ${bs.map(b=>`<option value="${b.id}"${ms.building===b.id?' selected':''}>${esc(b.name)}</option>`).join('')}</select>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="btn btn-sm btn-icon" onclick="shiftMeterPeriod(-1)">‹</button>
        <input class="inp" type="month" value="${ms.period}" style="width:150px" onchange="TS.meterState.period=this.value;viewMeters($('#view'))">
        <button class="btn btn-sm btn-icon" onclick="shiftMeterPeriod(1)">›</button>
      </div>
      <div style="flex:1"></div>
      <button class="btn btn-primary" onclick="saveMeters()">💾 Lưu tất cả chỉ số</button>
    </div>
    ${renderMeterTable()}`;
}
function shiftMeterPeriod(d){ TS.meterState.period=addMonth(TS.meterState.period,d); viewMeters($('#view')); }
function renderMeterTable(){
  const ms=TS.meterState; const svc=DB.byId('services',ms.service);
  let rooms=DB.all('rooms').filter(r=>roomStatus(r).key==='occupied');
  if(ms.building!=='all')rooms=rooms.filter(r=>r.buildingId===ms.building);
  rooms.sort((a,b)=>a.name.localeCompare(b.name,'vi',{numeric:true}));
  if(!rooms.length)return `<div class="empty"><div class="ei">⚡</div><h4>Không có phòng đang thuê</h4><p>Chỉ ghi chỉ số cho phòng có khách.</p></div>`;
  return `<div class="card pad0"><div class="tbl-wrap"><table>
    <thead><tr><th>Phòng</th><th>Khách</th><th class="num">Chỉ số cũ</th><th class="num">Chỉ số mới</th><th class="num">Tiêu thụ</th><th class="num">Thành tiền</th></tr></thead>
    <tbody>${rooms.map(r=>{ const rep=roomRep(r.id);
      const cur=DB.where('readings',x=>x.roomId===r.id&&x.serviceId===svc.id&&x.period===ms.period)[0];
      const prevRec=lastReading(r.id,svc.id,ms.period);
      const prevVal=cur?cur.previous:(prevRec?prevRec.current:0);
      const curVal=cur?cur.current:'';
      return `<tr data-room="${r.id}">
        <td class="t-strong">${esc(r.name)}</td><td class="t-dim">${esc(rep?rep.name:'—')}</td>
        <td class="num"><input class="inp mono" style="text-align:right;padding:6px 8px;width:100px" type="number" value="${prevVal}" data-f="prev" oninput="meterRowCalc('${r.id}')"></td>
        <td class="num"><input class="inp mono" style="text-align:right;padding:6px 8px;width:100px" type="number" value="${curVal}" placeholder="—" data-f="cur" oninput="meterRowCalc('${r.id}')"></td>
        <td class="num t-strong" data-out="use">—</td>
        <td class="num gold" data-out="amount">—</td></tr>`;}).join('')}</tbody></table></div>
    <div style="padding:12px 16px;border-top:1px solid var(--line);display:flex;justify-content:space-between">
      <span class="t-dim">Đơn giá: <b class="gold">${fmt(svc.unitPrice)}đ/${esc(svc.unit)}</b> · ${rooms.length} phòng</span>
      <span>Tổng dự kiến: <b class="gold" id="meterTotal">0 đ</b></span></div></div>`;
}
function meterRowCalc(roomId){ const svc=DB.byId('services',TS.meterState.service);
  const row=$(`tr[data-room="${roomId}"]`); if(!row)return;
  const prev=parseNum($('input[data-f="prev"]',row).value); const curEl=$('input[data-f="cur"]',row);
  const curRaw=curEl.value; const cur=parseNum(curRaw);
  const useEl=$('[data-out="use"]',row); const amtEl=$('[data-out="amount"]',row);
  if(curRaw===''){ useEl.textContent='—'; amtEl.textContent='—'; curEl.style.borderColor=''; recalcMeterTotal(); return; }
  const r=Bill.computeConsumption({previous:prev,current:cur});
  useEl.textContent=fmt(r.consumption); amtEl.textContent=fmt(r.consumption*svc.unitPrice)+'đ';
  curEl.style.borderColor=r.warning?'var(--danger)':''; useEl.style.color=r.warning?'var(--danger)':'';
  curEl.title=r.warning||''; recalcMeterTotal();
}
function recalcMeterTotal(){ const svc=DB.byId('services',TS.meterState.service); let total=0;
  $$('#view tr[data-room]').forEach(row=>{ const prev=parseNum($('input[data-f="prev"]',row).value);
    const curRaw=$('input[data-f="cur"]',row).value; if(curRaw==='')return;
    const r=Bill.computeConsumption({previous:prev,current:parseNum(curRaw)}); total+=r.consumption*svc.unitPrice; });
  const el=$('#meterTotal'); if(el)el.textContent=fmt(total)+' đ'; }
async function saveMeters(){ const svc=DB.byId('services',TS.meterState.service); const per=TS.meterState.period; let n=0;
  for(const row of $$('#view tr[data-room]')){ const roomId=row.dataset.room;
    const prev=parseNum($('input[data-f="prev"]',row).value); const curRaw=$('input[data-f="cur"]',row).value;
    if(curRaw==='')continue; const cur=parseNum(curRaw);
    const existing=DB.where('readings',x=>x.roomId===roomId&&x.serviceId===svc.id&&x.period===per)[0];
    const rec=existing||{roomId,serviceId:svc.id,period:per}; rec.previous=prev; rec.current=cur; rec.date=today();
    await DB.put('readings',rec); n++; }
  toast(`Đã lưu ${n} chỉ số ${svc.name} kỳ ${monthLabel(per)}`); markCl('meter');
}


/* ================= TrọSafe — Invoices + Payments + Debt + Expenses + Reports + Backup + Settings + Print + Init ================= */

function emptyState(icon,title,desc,action=''){ return `<div class="empty"><div class="ei">${icon}</div><h4>${esc(title)}</h4><p>${esc(desc)}</p>${action}</div>`; }
function invStatusBadge(s){ return {paid:'<span class="badge-s b-ok"><span class="dot"></span>Đã thu</span>',
  partial:'<span class="badge-s b-gold"><span class="dot"></span>Thu 1 phần</span>',
  unpaid:'<span class="badge-s b-danger"><span class="dot"></span>Chưa thu</span>'}[s]||s; }

/* ============================================================
   HÓA ĐƠN (Invoices)
   ============================================================ */
TS.invPeriod=nowMonth();
function viewInvoices(v){
  $('#topActions').innerHTML=`<button class="btn btn-gold" onclick="batchBilling()"><span class="ic">⚡</span>Lập HĐ hàng loạt</button>
    <button class="btn btn-primary" onclick="quickInvoiceRoom()"><span class="ic">＋</span>Lập 1 hóa đơn</button>`;
  const per=TS.invPeriod;
  const invs=DB.where('invoices',i=>i.period===per).sort((a,b)=>{const ra=DB.byId('rooms',a.roomId),rb=DB.byId('rooms',b.roomId);
    return (ra?ra.name:'').localeCompare(rb?rb.name:'','vi',{numeric:true});});
  const tot=invs.reduce((a,i)=>a+i.total,0), paid=invs.reduce((a,i)=>a+i.paid,0), rem=tot-paid;
  v.innerHTML=`
    <div class="filter-bar">
      <div style="display:flex;align-items:center;gap:6px">
        <button class="btn btn-sm btn-icon" onclick="shiftInvPeriod(-1)">‹</button>
        <input class="inp" type="month" value="${per}" style="width:150px" onchange="TS.invPeriod=this.value;viewInvoices($('#view'))">
        <button class="btn btn-sm btn-icon" onclick="shiftInvPeriod(1)">›</button>
      </div>
      <div style="flex:1"></div>
      <div class="pill-row">
        <span class="badge-s b-dim">Tổng ${fmtShort(tot)}</span>
        <span class="badge-s b-ok">Đã thu ${fmtShort(paid)}</span>
        ${rem>0?`<span class="badge-s b-danger">Còn ${fmtShort(rem)}</span>`:''}</div>
    </div>
    ${invs.length?`<div class="card pad0"><div class="tbl-wrap"><table>
      <thead><tr><th>Phòng</th><th>Khách</th><th class="num">Tiền phòng</th><th class="num">Dịch vụ</th><th class="num">Nợ cũ</th><th class="num">Tổng cộng</th><th class="num">Còn nợ</th><th>TT</th><th></th></tr></thead>
      <tbody>${invs.map(i=>{ const room=DB.byId('rooms',i.roomId);
        return `<tr>
          <td class="t-strong">${esc(room?room.name:'—')}</td><td class="t-dim">${esc(i.tenantName||'—')}</td>
          <td class="num">${fmt(i.rentAmount)}</td><td class="num">${fmt(i.serviceAmount)}</td>
          <td class="num ${i.previousDebt?'down':'t-dim'}">${i.previousDebt?fmt(i.previousDebt):'—'}</td>
          <td class="num t-strong gold">${fmt(i.total)}</td>
          <td class="num ${i.remaining>0?'down':'jade'}">${fmt(i.remaining)}</td><td>${invStatusBadge(i.status)}</td>
          <td class="t-actions">
            ${i.remaining>0?`<button class="btn btn-sm btn-primary" onclick="recordPayment('${i.id}')">Thu</button>`:''}
            <button class="btn btn-sm btn-ghost btn-icon" onclick="ptInvoiceMenu('${i.id}')" title="In">⎙</button>
            <button class="btn btn-sm btn-ghost btn-icon" onclick="quickInvoiceRoom('${i.roomId}','${i.period}')" title="Sửa">✎</button>
            <button class="btn btn-sm btn-ghost btn-icon" onclick="delInvoice('${i.id}')" title="Xoá">🗑</button></td></tr>`;}).join('')}
      </tbody></table></div></div>`
    :emptyState('▤',`Chưa có hóa đơn ${monthLabel(per)}`,'Bấm "Lập HĐ hàng loạt" để tạo hóa đơn cho tất cả phòng đang thuê cùng lúc.',
      `<button class="btn btn-gold" onclick="batchBilling()">⚡ Lập HĐ hàng loạt</button>`)}`;
}
function shiftInvPeriod(d){ TS.invPeriod=addMonth(TS.invPeriod,d); viewInvoices($('#view')); }
async function delInvoice(id){ const inv=DB.byId('invoices',id);
  if(inv.paid>0){ if(!await confirmDlg({title:'Hóa đơn đã có thanh toán',msg:`Đã thu ${fmt(inv.paid)}đ. Xoá sẽ xoá cả lịch sử thu của hóa đơn này.`,danger:true,okText:'Vẫn xoá'}))return; }
  else if(!await confirmDlg({title:'Xoá hóa đơn?',danger:true,okText:'Xoá'}))return;
  for(const p of DB.where('payments',p=>p.invoiceId===id))await DB.del('payments',p.id);
  await DB.del('invoices',id); closeModal&&closeModal(); toast('Đã xoá hóa đơn'); viewInvoices($('#view'));
}

/* ---------- Billing modal (LÕI) ---------- */
function billingContext(roomId,period){
  const room=DB.byId('rooms',roomId); const rep=roomRep(roomId);
  const occupants=roomTenants(roomId).length||1;
  const vehicles=roomTenants(roomId).reduce((a,t)=>a+(t.vehicles||0),0)||0;
  const con=activeContract(roomId);
  // nợ cũ = tổng còn nợ của các hóa đơn kỳ trước (không tính kỳ đang lập)
  const prevDebt=DB.where('invoices',i=>i.roomId===roomId&&i.period<period&&i.status!=='paid').reduce((a,i)=>a+i.remaining,0);
  return {room,rep,occupants,vehicles,con,prevDebt};
}
function quickInvoiceRoom(roomId,period){
  const rooms=DB.all('rooms').filter(r=>roomStatus(r).key==='occupied'||r.id===roomId);
  if(!rooms.length){ toast('Không có phòng đang thuê để lập hóa đơn','warn'); return; }
  TS.billRoom=roomId||rooms[0].id; TS.billPeriod=period||TS.invPeriod||nowMonth();
  renderBillingModal();
}
function renderBillingModal(){
  const roomId=TS.billRoom, period=TS.billPeriod;
  const rooms=DB.all('rooms').sort((a,b)=>a.name.localeCompare(b.name,'vi',{numeric:true}));
  const ctx=billingContext(roomId,period);
  const svc=DB.all('services');
  const existing=DB.where('invoices',i=>i.roomId===roomId&&i.period===period)[0];
  // Chuẩn bị dòng dịch vụ với chỉ số auto
  const svcRows=svc.map(s=>{ const row={id:s.id,name:s.name,type:s.type,unit:s.unit,unitPrice:s.unitPrice,icon:s.icon};
    if(s.type==='metered'){ const rec=DB.where('readings',x=>x.roomId===roomId&&x.serviceId===s.id&&x.period===period)[0];
      const prevRec=lastReading(roomId,s.id,period);
      row.prev=rec?rec.previous:(prevRec?prevRec.current:0); row.cur=rec?rec.current:''; }
    if(s.type==='per_unit')row.qty=1;
    return row; });
  openModal(`
    <div class="modal-head"><h3>${existing?'Sửa':'Lập'} hóa đơn</h3>
      <span class="badge-s b-gold" style="margin-left:8px">${monthLabel(period)}</span>
      <div style="flex:1"></div><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-row fr2" style="margin-bottom:14px">
        <div class="field" style="margin:0"><label>Phòng</label>
          <select class="inp" onchange="TS.billRoom=this.value;renderBillingModal()">
            ${rooms.map(r=>`<option value="${r.id}"${r.id===roomId?' selected':''}>${esc(r.name)} — ${esc(DB.byId('buildings',r.buildingId)?.name||'')}</option>`).join('')}</select></div>
        <div class="field" style="margin:0"><label>Kỳ</label>
          <input class="inp" type="month" value="${period}" onchange="TS.billPeriod=this.value;renderBillingModal()"></div>
      </div>
      ${ctx.rep?`<div class="info-box" style="margin-bottom:14px">👤 ${esc(ctx.rep.name)} · ${ctx.occupants} người ở · ${ctx.vehicles} xe</div>`:'<div class="warn-box" style="margin-bottom:14px">⚠ Phòng chưa có khách đại diện.</div>'}
      ${existing?`<div class="warn-box" style="margin-bottom:14px">⚠ Đã có hóa đơn kỳ này. Lưu sẽ ghi đè (giữ nguyên số đã thu ${fmt(existing.paid)}đ).</div>`:''}

      <div class="field"><label>Tiền phòng</label>
        <div class="inp-suffix"><input class="inp" id="bRent" type="number" value="${ctx.con&&ctx.con.rentPrice?ctx.con.rentPrice:ctx.room.basePrice}" oninput="calcBill()"><span class="sfx">đ</span></div></div>

      <div style="font-weight:700;font-size:13px;margin:16px 0 8px">Dịch vụ</div>
      <div id="billSvc">${svcRows.map(s=>billSvcRow(s)).join('')||'<div class="t-dim">Chưa cấu hình dịch vụ.</div>'}</div>

      <div class="form-row fr2" style="margin-top:16px">
        <div class="field" style="margin:0"><label>Nợ cũ chuyển sang</label>
          <div class="inp-suffix"><input class="inp" id="bPrevDebt" type="number" value="${ctx.prevDebt}" oninput="calcBill()"><span class="sfx">đ</span></div>
          <div class="hint">Tự tính từ hóa đơn chưa thu trước đó.</div></div>
        <div class="field" style="margin:0"><label>Ghi chú nợ cũ</label><input class="inp" id="bPrevNote" placeholder="(tuỳ chọn)"></div>
      </div>
      <div class="form-row fr2">
        <div class="field" style="margin:0"><label>Miễn giảm (−)</label><div class="inp-suffix"><input class="inp" id="bDiscount" type="number" value="0" oninput="calcBill()"><span class="sfx">đ</span></div></div>
        <div class="field" style="margin:0"><label>Phụ thu (+)</label><div class="inp-suffix"><input class="inp" id="bSurcharge" type="number" value="0" oninput="calcBill()"><span class="sfx">đ</span></div></div>
      </div>

      <div class="card" style="margin-top:16px;background:var(--bg);padding:14px" id="billPreview"></div>
      <div id="billWarn"></div>
    </div>
    <div class="modal-foot">
      <label class="chk" style="margin-right:auto"><input type="checkbox" id="bSaveMeter" checked> Lưu luôn chỉ số điện nước</label>
      <button class="btn btn-ghost" onclick="closeModal()">Huỷ</button>
      <button class="btn btn-primary" onclick="saveBilling()">Lưu hóa đơn</button>
    </div>`,{size:'wide'});
  TS._billSvcRows=svcRows; TS._billExisting=existing; calcBill();
}
function billSvcRow(s){
  const icon=s.icon||'⚙';
  if(s.type==='metered'){ return `<div class="bill-row" data-sid="${s.id}" data-type="metered" style="display:grid;grid-template-columns:1.3fr 1fr 1fr auto;gap:8px;align-items:center;padding:8px;background:var(--bg-2);border-radius:8px;margin-bottom:6px">
    <div style="font-weight:600;font-size:13px">${icon} ${esc(s.name)}<div class="t-dim" style="font-size:11px">${fmt(s.unitPrice)}đ/${esc(s.unit)}</div></div>
    <input class="inp mono" data-f="prev" type="number" value="${s.prev}" placeholder="Cũ" style="padding:7px 8px;text-align:right" oninput="calcBill()">
    <input class="inp mono" data-f="cur" type="number" value="${s.cur}" placeholder="Mới" style="padding:7px 8px;text-align:right" oninput="calcBill()">
    <div class="mono gold" data-out style="min-width:80px;text-align:right;font-size:13px">—</div></div>`; }
  if(s.type==='per_unit'){ return `<div class="bill-row" data-sid="${s.id}" data-type="per_unit" style="display:grid;grid-template-columns:1.3fr 1fr auto;gap:8px;align-items:center;padding:8px;background:var(--bg-2);border-radius:8px;margin-bottom:6px">
    <div style="font-weight:600;font-size:13px">${icon} ${esc(s.name)}<div class="t-dim" style="font-size:11px">${fmt(s.unitPrice)}đ/${esc(s.unit||'đv')}</div></div>
    <input class="inp mono" data-f="qty" type="number" value="${s.qty||1}" placeholder="SL" style="padding:7px 8px;text-align:right" oninput="calcBill()">
    <div class="mono gold" data-out style="min-width:80px;text-align:right;font-size:13px">—</div></div>`; }
  // fixed / per_person / per_vehicle: hiển thị + cho tắt
  const auto={per_person:'theo số người',per_vehicle:'theo số xe',per_room:'cố định'}[s.type]||'';
  return `<div class="bill-row" data-sid="${s.id}" data-type="${s.type}" style="display:grid;grid-template-columns:1.3fr 1fr auto;gap:8px;align-items:center;padding:8px;background:var(--bg-2);border-radius:8px;margin-bottom:6px">
    <div style="font-weight:600;font-size:13px">${icon} ${esc(s.name)}<div class="t-dim" style="font-size:11px">${fmt(s.unitPrice)}đ · ${auto}</div></div>
    <label class="chk" style="font-size:12px"><input type="checkbox" data-f="on" checked oninput="calcBill()"> Tính</label>
    <div class="mono gold" data-out style="min-width:80px;text-align:right;font-size:13px">—</div></div>`;
}
function collectBillLines(){ const ctx=billingContext(TS.billRoom,TS.billPeriod); const lines=[];
  $$('#billSvc .bill-row').forEach(row=>{ const sid=row.dataset.sid; const svc=DB.byId('services',sid); const type=row.dataset.type;
    const o={id:sid,name:svc.name,type,unit:svc.unit,unitPrice:svc.unitPrice};
    if(type==='metered'){ o.reading={previous:parseNum($('[data-f="prev"]',row).value),current:$('[data-f="cur"]',row).value===''?0:parseNum($('[data-f="cur"]',row).value)};
      o._skip=$('[data-f="cur"]',row).value===''; }
    else if(type==='per_unit'){ o.quantity=parseNum($('[data-f="qty"]',row).value); }
    else { if(!$('[data-f="on"]',row).checked)o._skip=true; }
    lines.push(o); });
  return {ctx,lines:lines.filter(l=>!l._skip)};
}
function calcBill(){ const {ctx,lines}=collectBillLines();
  const inv=Bill.computeInvoice({period:TS.billPeriod,roomName:ctx.room.name,
    rentOverride:parseNum($('#bRent').value),services:lines,
    context:{occupants:ctx.occupants,vehicles:ctx.vehicles,prorate:false},
    previousDebt:parseNum($('#bPrevDebt').value),discount:parseNum($('#bDiscount').value),surcharge:parseNum($('#bSurcharge').value)});
  // cập nhật từng dòng out
  $$('#billSvc .bill-row').forEach(row=>{ const l=inv.lines.find(x=>x.serviceId===row.dataset.sid);
    const out=$('[data-out]',row); if(out)out.textContent=l?fmt(l.amount)+'đ':'—'; });
  $('#billPreview').innerHTML=`
    <div class="kv"><span class="k">Tiền phòng</span><span class="v">${fmt(inv.rentAmount)} đ</span></div>
    <div class="kv"><span class="k">Dịch vụ (${inv.lines.length})</span><span class="v">${fmt(inv.serviceAmount)} đ</span></div>
    ${inv.previousDebt?`<div class="kv"><span class="k">Nợ cũ</span><span class="v down">${fmt(inv.previousDebt)} đ</span></div>`:''}
    ${inv.surcharge?`<div class="kv"><span class="k">Phụ thu</span><span class="v">${fmt(inv.surcharge)} đ</span></div>`:''}
    ${inv.discount?`<div class="kv"><span class="k">Miễn giảm</span><span class="v jade">− ${fmt(inv.discount)} đ</span></div>`:''}
    <div class="kv" style="border-top:2px solid var(--line-2);margin-top:4px;padding-top:10px"><span class="k" style="font-size:15px;color:var(--text)">TỔNG CỘNG</span><span class="v gold" style="font-size:20px">${fmt(inv.total)} đ</span></div>`;
  $('#billWarn').innerHTML=inv.warnings.length?`<div class="warn-box" style="margin-top:10px">⚠ ${inv.warnings.map(esc).join('<br>')}</div>`:'';
  TS._billComputed=inv;
}
async function saveBilling(){ const {ctx,lines}=collectBillLines();
  const inv=Bill.computeInvoice({period:TS.billPeriod,roomName:ctx.room.name,rentOverride:parseNum($('#bRent').value),
    services:lines,context:{occupants:ctx.occupants,vehicles:ctx.vehicles,prorate:false},
    previousDebt:parseNum($('#bPrevDebt').value),discount:parseNum($('#bDiscount').value),surcharge:parseNum($('#bSurcharge').value)});
  const existing=TS._billExisting;
  inv.roomId=TS.billRoom; inv.buildingId=ctx.room.buildingId; inv.tenantName=ctx.rep?ctx.rep.name:'';
  inv.discountNote=''; inv.surchargeNote=$('#bPrevNote').value.trim();
  inv.createdDate=today(); inv.dueDate=TS.billPeriod+'-10';
  if(existing){ inv.id=existing.id; inv.seq=existing.seq; inv.createdDate=existing.createdDate;
    const p=Bill.applyPayment(inv,existing.paid); Object.assign(inv,p); }
  else { inv.seq=(DB.where('invoices',i=>i.period===TS.billPeriod).length)+1; }
  await DB.put('invoices',inv);
  // Lưu chỉ số điện nước nếu chọn
  if($('#bSaveMeter')&&$('#bSaveMeter').checked){ for(const l of lines){ if(l.type==='metered'){
    const ex=DB.where('readings',x=>x.roomId===TS.billRoom&&x.serviceId===l.id&&x.period===TS.billPeriod)[0];
    const rec=ex||{roomId:TS.billRoom,serviceId:l.id,period:TS.billPeriod};
    rec.previous=l.reading.previous; rec.current=l.reading.current; rec.date=today(); await DB.put('readings',rec); }}}
  closeModal(); toast(`Đã lưu hóa đơn phòng ${ctx.room.name}`); markCl('invoice');
  if(TS.route==='invoices'){TS.invPeriod=TS.billPeriod;viewInvoices($('#view'));} else go('invoices');
}
async function batchBilling(){ const period=TS.invPeriod||nowMonth();
  const rooms=DB.all('rooms').filter(r=>roomStatus(r).key==='occupied');
  if(!rooms.length){ toast('Không có phòng đang thuê','warn'); return; }
  const svc=DB.all('services'); const metered=svc.filter(s=>s.type==='metered');
  // kiểm tra phòng thiếu chỉ số
  const missing=rooms.filter(r=>metered.some(s=>!DB.where('readings',x=>x.roomId===r.id&&x.serviceId===s.id&&x.period===period).length));
  const existing=rooms.filter(r=>DB.where('invoices',i=>i.roomId===r.id&&i.period===period).length);
  const proceed=await confirmDlg({title:`Lập hóa đơn hàng loạt — ${monthLabel(period)}`,
    msg:`Tạo hóa đơn cho <b>${rooms.length}</b> phòng đang thuê.<br>
      ${missing.length?`<span style="color:var(--warn)">⚠ ${missing.length} phòng chưa ghi điện nước kỳ này (${missing.map(r=>esc(r.name)).join(', ')}) — sẽ tính 0 cho phần đó.</span><br>`:''}
      ${existing.length?`<span style="color:var(--warn)">⚠ ${existing.length} phòng đã có hóa đơn — sẽ được cập nhật.</span>`:''}`,
    okText:'Tạo hóa đơn'});
  if(!proceed)return;
  let seq=DB.where('invoices',i=>i.period===period).length; let n=0;
  for(const room of rooms){ const ctx=billingContext(room.id,period);
    const lines=svc.map(s=>{ const o={id:s.id,name:s.name,type:s.type,unit:s.unit,unitPrice:s.unitPrice};
      if(s.type==='metered'){ const rec=DB.where('readings',x=>x.roomId===room.id&&x.serviceId===s.id&&x.period===period)[0];
        const prevRec=lastReading(room.id,s.id,period);
        o.reading={previous:prevRec?prevRec.current:0,current:rec?rec.current:(prevRec?prevRec.current:0)};
        if(!rec)o.reading.current=prevRec?prevRec.current:0; }
      return o; });
    const inv=Bill.computeInvoice({period,roomName:room.name,rentOverride:ctx.con&&ctx.con.rentPrice?ctx.con.rentPrice:room.basePrice,
      services:lines,context:{occupants:ctx.occupants,vehicles:ctx.vehicles,prorate:false},previousDebt:ctx.prevDebt});
    const ex=DB.where('invoices',i=>i.roomId===room.id&&i.period===period)[0];
    inv.roomId=room.id; inv.buildingId=room.buildingId; inv.tenantName=ctx.rep?ctx.rep.name:'';
    inv.createdDate=today(); inv.dueDate=period+'-10';
    if(ex){ inv.id=ex.id; inv.seq=ex.seq; const p=Bill.applyPayment(inv,ex.paid); Object.assign(inv,p); }
    else { inv.seq=++seq; }
    await DB.put('invoices',inv); n++; }
  toast(`Đã lập ${n} hóa đơn kỳ ${monthLabel(period)}`,'ok','Hoàn tất'); markCl('invoice');
  TS.invPeriod=period; viewInvoices($('#view'));
}

async function savePayment(invoiceId){ const amount=parseNum($('#pAmount').value);

  await DB.put('payments',{invoiceId,roomId:inv.roomId,amount,date:$('#pDate').value||today(),method:$('#pMethod').value,note:$('#pNote').value.trim()});
  const p=Bill.applyPayment(inv,amount); Object.assign(inv,p); await DB.put('invoices',inv);
  closeModal(); toast(`Đã thu ${fmt(amount)}đ${p.overpaid?` (dư ${fmt(p.overpaid)}đ)`:''}`,'ok');

function viewDebt(v){

    const debt=invs.reduce((a,i)=>a+i.remaining,0); return {r,invs,debt}; }).filter(x=>x.debt>0).sort((a,b)=>b.debt-a.debt);
  const total=rows.reduce((a,x)=>a+x.debt,0);
  $('#topActions').innerHTML=rows.length?`<button class="btn btn-ghost" onclick="copyDebtReminders()">📋 Sao chép danh sách nhắc nợ</button>`:'';
  v.innerHTML=`

      <div class="stat"><div class="lbl">HĐ chưa thu đủ</div><div class="val">${rows.reduce((a,x)=>a+x.invs.length,0)}</div></div>
    </div>

      <tbody>${rows.map(x=>{ const rep=roomRep(x.r.id);
        return `<tr><td class="t-strong">${esc(x.r.name)}</td><td>${esc(rep?rep.name:'—')}</td>
          <td class="t-dim">${esc(rep?rep.phone:'—')}</td>
          <td>${x.invs.map(i=>`<span class="badge-s b-danger" style="margin:1px">${monthLabel(i.period).replace('Tháng ','T')} · ${fmtShort(i.remaining)}</span>`).join(' ')}</td>
          <td class="num down t-strong">${fmt(x.debt)}</td>
          <td class="t-actions">
            <button class="btn btn-sm btn-primary" onclick="recordPayment('${x.invs[0].id}')">Thu</button>
            <button class="btn btn-sm btn-ghost" onclick="openRoom('${x.r.id}')">Xem</button></td></tr>`;}).join('')}
      </tbody></table></div></div>`
    :`<div class="empty"><div class="ei">✓</div><h4>Tuyệt vời! Không có công nợ</h4><p>Tất cả phòng đã thanh toán đầy đủ.</p></div>`}`;
}
function copyDebtReminders(){ const rows=DB.all('rooms').map(r=>({r,d:roomDebt(r.id)})).filter(x=>x.d>0);
  const text=rows.map(x=>{ const rep=roomRep(x.r.id);
    return `Phòng ${x.r.name}${rep?' - '+rep.name:''}${rep&&rep.phone?' ('+rep.phone+')':''}: còn nợ ${fmt(x.d)}đ`; }).join('\n');
  navigator.clipboard?.writeText(text).then(()=>toast('Đã sao chép danh sách nhắc nợ'),()=>toast('Không sao chép được','err'));
}

function barChart(data,{h=180,fmt:ff=fmtShort,color='var(--jade)'}={}){
  const max=Math.max(1,...data.map(d=>d.v)); const bw=100/data.length;
  return `<svg viewBox="0 0 ${data.length*60} ${h+34}" style="width:100%;height:${h+34}px" preserveAspectRatio="none">
    ${data.map((d,i)=>{ const bh=d.v/max*h; const x=i*60+12; const y=h-bh+6;
      return `<g><rect x="${x}" y="${y}" width="36" height="${Math.max(1,bh)}" rx="4" fill="${d.color||color}" opacity="0.9"></rect>
        <text x="${x+18}" y="${y-5}" text-anchor="middle" font-size="10" fill="#A9BEB4">${d.v?ff(d.v):''}</text>
        <text x="${x+18}" y="${h+22}" text-anchor="middle" font-size="10" fill="#6E867B">${esc(d.l)}</text></g>`;}).join('')}
  </svg>`;
}
function viewReports(v){
  const months=[]; for(let i=5;i>=0;i--)months.push(addMonth(nowMonth(),-i));
  const revData=months.map(m=>{ const collected=DB.where('payments',p=>p.date&&p.date.startsWith(m)).reduce((a,p)=>a+p.amount,0);
    return {l:'T'+(+m.split('-')[1]),v:collected}; });
  const expData=months.map(m=>{ const c=DB.where('expenses',e=>e.date&&e.date.startsWith(m)).reduce((a,e)=>a+e.amount,0);
    return {l:'T'+(+m.split('-')[1]),v:c,color:'var(--danger)'}; });
  const rooms=DB.all('rooms'); const occ=rooms.filter(r=>roomStatus(r).key==='occupied').length;
  const totalRev=DB.all('payments').reduce((a,p)=>a+p.amount,0);
  const totalExp=DB.all('expenses').reduce((a,e)=>a+e.amount,0);
  const profit=totalRev-totalExp;
  // tiêu thụ điện nước kỳ gần nhất
  const per=addMonth(nowMonth(),-1);
  const metered=DB.where('services',s=>s.type==='metered');
  const consData=metered.map(s=>{ const total=DB.where('readings',r=>r.serviceId===s.id&&r.period===per)
    .reduce((a,r)=>a+Math.max(0,r.current-r.previous),0); return {l:s.name,v:total,color:s.name==='Điện'?'var(--gold)':'var(--sky)'}; });
  v.innerHTML=`
    <div class="grid g4" style="margin-bottom:16px">
      <div class="stat"><div class="lbl">Tổng doanh thu</div><div class="val jade">${fmtShort(totalRev)}</div></div>
      <div class="stat"><div class="lbl">Tổng chi phí</div><div class="val down">${fmtShort(totalExp)}</div></div>
      <div class="stat" style="--accent:rgba(201,162,75,.14)"><div class="lbl">Lợi nhuận ròng</div><div class="val gold">${fmtShort(profit)}</div></div>
      <div class="stat"><div class="lbl">Lấp đầy</div><div class="val">${rooms.length?Math.round(occ/rooms.length*100):0}<small>%</small></div></div>
    </div>
    <div class="grid g2">
      <div class="card"><div class="card-head" style="padding:0 0 12px;border:none"><h3>Doanh thu 6 tháng</h3></div>${barChart(revData)}</div>
      <div class="card"><div class="card-head" style="padding:0 0 12px;border:none"><h3>Chi phí 6 tháng</h3></div>${barChart(expData,{color:'var(--danger)'})}</div>
    </div>
    <div class="grid g2" style="margin-top:16px">
      <div class="card"><div class="card-head" style="padding:0 0 12px;border:none"><h3>Tiêu thụ ${monthLabel(per)}</h3></div>
        ${consData.length?barChart(consData,{fmt:n=>fmt(n)}):'<div class="t-dim">Chưa có dữ liệu chỉ số.</div>'}</div>
      <div class="card"><div class="card-head" style="padding:0 0 12px;border:none"><h3>Doanh thu theo dãy trọ</h3></div>
        ${(function(){ const bs=DB.all('buildings'); const rows=bs.map(b=>{ const rev=DB.all('rooms').filter(r=>r.buildingId===b.id&&roomStatus(r).key==='occupied').reduce((a,r)=>a+roomEffectivePrice(r),0); return {b,rev}; }).sort((a,b)=>b.rev-a.rev);
          const max=Math.max(1,...rows.map(r=>r.rev));
          return rows.map(r=>`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${esc(r.b.name)}</span><span class="gold" style="font-weight:700">${fmt(r.rev)}đ</span></div><div class="mini-bar" style="height:8px"><span style="width:${r.rev/max*100}%;background:linear-gradient(90deg,var(--gold-dim),var(--gold))"></span></div></div>`).join('')||'<div class="t-dim">Chưa có dữ liệu.</div>'; })()}</div>
    </div>`;
}

function currentEmail(){ try{ return window.FB.auth.currentUser?.email||''; }catch(e){ return ''; } }
async function doLogout(){ if(await confirmDlg({title:'Đăng xuất?',msg:'Anh sẽ cần đăng nhập lại để xem dữ liệu.',okText:'Đăng xuất'})){
  try{ await window.FB.signOut(window.FB.auth); location.reload(); }catch(e){ toast('Lỗi đăng xuất','err'); } } }
async function exportData(){ const data={_app:'TrọSafe',_version:1,_exportedAt:new Date().toISOString(),data:{}};
  for(const s of STORES)data.data[s]=DB.all(s);
  data.checklist=clState();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=`trosafe-backup-${today()}.json`; a.click(); URL.revokeObjectURL(url);
  toast('Đã tải file backup'); markCl('backup');
}
function importData(input){ const file=input.files[0]; if(!file)return; const reader=new FileReader();
  reader.onload=async e=>{ try{ const parsed=JSON.parse(e.target.result);
    if(!parsed.data||!parsed._app){ toast('File không đúng định dạng TrọSafe','err'); return; }
    if(!await confirmDlg({title:'Phục hồi dữ liệu?',msg:'Toàn bộ dữ liệu hiện tại sẽ bị thay thế.',danger:true,okText:'Phục hồi'})){input.value='';return;}
    await DB.clearAll();
    for(const s of STORES){ if(parsed.data[s]&&parsed.data[s].length)await DB.bulk(s,parsed.data[s]); }
    if(parsed.checklist)localStorage.setItem('trosafe_checklist',JSON.stringify(parsed.checklist));
    DB._loadSettings(); toast('Đã phục hồi dữ liệu thành công','ok'); go('dashboard');
  }catch(err){ toast('Lỗi đọc file: '+err.message,'err'); } input.value=''; };
  reader.readAsText(file);
}
async function wipeData(){ if(!await confirmDlg({title:'Xoá sạch toàn bộ?',msg:'Tất cả dãy trọ, phòng, khách, hóa đơn… sẽ bị xoá vĩnh viễn. Hãy chắc chắn anh đã backup.',danger:true,okText:'Xoá sạch'}))return;
  if(!await confirmDlg({title:'Xác nhận lần cuối',msg:'Không thể hoàn tác. Tiếp tục?',danger:true,okText:'Tôi chắc chắn'}))return;
  await DB.clearAll(); localStorage.removeItem('trosafe_checklist'); DB._loadSettings(); toast('Đã xoá sạch dữ liệu','info'); go('dashboard');
}

        <div style="display:flex;justify-content:space-around;margin-top:40px;text-align:center">

          <div><b>BÊN THUÊ (B)</b><div style="color:#6E867B;font-size:12px">(Ký, ghi rõ họ tên)</div><div style="height:60px"></div></div>

/* ============================================================
   EXT — Mở rộng TrọSafe:
   (A) IN ĐA MÁY: trình duyệt (WiFi/AirPrint/PDF) + Bluetooth nhiệt ESC/POS
       (raster ảnh → giữ nguyên tiếng Việt). Port từ app Sổ Nợ.
   (B) KHÁCH QUA ĐÊM: thuê ngắn hạn theo đêm/giờ + biên nhận.
   ============================================================ */

/* ---------- (A) IN NHIỆT ESC/POS ---------- */
var PT = {
  bt:{device:null,server:null,char:null,name:''},
  services:[0x18F0,0xFF00,0xFFE0,0xFEE7,0x18F1,
    '000018f0-0000-1000-8000-00805f9b34fb','0000ff00-0000-1000-8000-00805f9b34fb',
    '0000ffe0-0000-1000-8000-00805f9b34fb'],
  sleep(ms){ return new Promise(r=>setTimeout(r,ms)); },
  supported(){ return !!(navigator.bluetooth&&navigator.bluetooth.requestDevice); },
  async connect(){
    if(!this.supported()){ toast('Máy này không hỗ trợ in Bluetooth (chỉ Android + Chrome).','warn'); return false; }
    try{
      const dev=await navigator.bluetooth.requestDevice({acceptAllDevices:true,optionalServices:this.services});
      this.bt.device=dev; this.bt.name=dev.name||'Máy in';
      dev.addEventListener('gattserverdisconnected',()=>{ this.bt.server=null; this.bt.char=null; });
      const srv=await dev.gatt.connect(); this.bt.server=srv;
      const services=await srv.getPrimaryServices(); let wc=null;
      for(let i=0;i<services.length&&!wc;i++){ const cs=await services[i].getCharacteristics();
        for(let j=0;j<cs.length;j++){ const pr=cs[j].properties; if(pr.write||pr.writeWithoutResponse){ wc=cs[j]; break; } } }
      if(!wc){ toast('Máy in này không cho ghi qua web (có thể là Bluetooth SPP cổ điển).','warn'); return false; }
      this.bt.char=wc; try{ localStorage.setItem('tro_bt_name',this.bt.name); }catch(e){}
      toast('Đã kết nối: '+this.bt.name,'ok'); return true;
    }catch(e){ toast('Không kết nối được máy in Bluetooth.','err'); return false; }
  },
  async write(bytes){ if(!this.bt.char)throw new Error('no char');
    for(let i=0;i<bytes.length;i+=128){ const part=bytes.slice(i,i+128);
      try{ await this.bt.char.writeValueWithoutResponse(part); }catch(e){ await this.bt.char.writeValue(part); }
      await this.sleep(20); } },
  raster(mono,width,height){
    const bpr=Math.ceil(width/8),out=[]; out.push(0x1B,0x40,0x1B,0x61,0x01); // ESC @ + căn giữa
    const BAND=128;
    for(let y0=0;y0<height;y0+=BAND){ const bh=(height-y0<BAND)?(height-y0):BAND;
      out.push(0x1D,0x76,0x30,0x00,bpr&0xff,(bpr>>8)&0xff,bh&0xff,(bh>>8)&0xff);
      for(let y=y0;y<y0+bh;y++){ for(let bx=0;bx<bpr;bx++){ let b=0;
        for(let k=0;k<8;k++){ const x=bx*8+k; if(x<width&&mono[y*width+x])b|=(0x80>>k); } out.push(b); } } }
    out.push(0x0A,0x0A,0x0A); return new Uint8Array(out);
  },
  // Dựng ảnh biên lai từ danh sách dòng
  _canvas(lines,width){
    const W=width||384,pad=10,cv=document.createElement('canvas'),ctx=cv.getContext('2d');
    const hgt=lines.map(ln=>ln.t==='hr'?16:((ln.size||22)+9));
    const H=pad*2+hgt.reduce((a,b)=>a+b,0);
    cv.width=W; cv.height=H;
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H); ctx.fillStyle='#000'; ctx.textBaseline='top';
    let y=pad;
    lines.forEach(ln=>{
      if(ln.t==='hr'){ ctx.save(); ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.setLineDash([5,4]);
        ctx.beginPath(); ctx.moveTo(pad,y+7); ctx.lineTo(W-pad,y+7); ctx.stroke(); ctx.restore(); y+=16; return; }
      const sz=ln.size||22;
      ctx.font=(ln.bold?'bold ':'')+sz+'px Roboto, "Segoe UI", Arial, sans-serif';
      if(ln.align==='center'){ ctx.textAlign='center'; ctx.fillText(ln.text,W/2,y); }
      else{ ctx.textAlign='left'; ctx.fillText(ln.text,pad,y);
        if(ln.right!=null){ ctx.textAlign='right'; ctx.fillText(ln.right,W-pad,y); } }
      y+=sz+9;
    });
    const d=ctx.getImageData(0,0,W,H).data,mono=new Uint8Array(W*H);
    for(let q=0;q<W*H;q++){ const lum=0.299*d[q*4]+0.587*d[q*4+1]+0.114*d[q*4+2]; mono[q]=lum<135?1:0; }
    return {mono,width:W,height:H};
  },
  // Canvas cho hóa đơn tiền phòng
  invoiceCanvas(inv,width){
    const s=TS.settings||{}; const lines=[]; const L=(t,o)=>{o=o||{};o.text=t;o.t='text';lines.push(o);};
    const HR=()=>lines.push({t:'hr'});
    L((s.bizName||'NHÀ TRỌ').toUpperCase(),{size:30,bold:true,align:'center'});
    if(s.bizAddr)L(s.bizAddr,{size:18,align:'center'});
    if(s.bizPhone)L('ĐT: '+s.bizPhone,{size:18,align:'center'});
    L('HÓA ĐƠN TIỀN PHÒNG',{size:22,bold:true,align:'center'});
    const [yy,mm]=(inv.period||'').split('-');
    L('Kỳ '+(mm||'')+'/'+(yy||'')+'   Phòng '+(inv.roomName||''),{size:19,align:'center'});
    HR();
    L('Tiền phòng',{size:23,bold:true,right:fmt(inv.rentAmount)});
    (inv.lines||[]).forEach(l=>{ L(l.name||'Dịch vụ',{size:22,bold:true});
      L('  '+fmt(l.quantity)+(l.unit?(' '+l.unit):'')+' x '+fmt(l.unitPrice),{size:20,right:fmt(l.amount)}); });
    HR();
    if(inv.previousDebt>0)L('Nợ cũ',{size:22,right:fmt(inv.previousDebt)});
    if(inv.surcharge>0)L('Phụ thu',{size:22,right:fmt(inv.surcharge)});
    if(inv.discount>0)L('Giảm giá',{size:22,right:'-'+fmt(inv.discount)});
    L('TỔNG CỘNG',{size:31,bold:true,right:fmt(inv.total)});
    if(inv.paid>0)L('Đã thu',{size:22,right:fmt(inv.paid)});
    L('CÒN LẠI',{size:27,bold:true,right:fmt(inv.remaining)});
    HR();
    if(s.bankNo){ L('CK: '+(s.bankName||'')+' '+s.bankNo,{size:18,align:'center'});
      if(s.bankName2||s.bizName)L((s.accName||s.bizName||'').toString(),{size:18,align:'center'}); }
    L('Cảm ơn quý khách!',{size:22,align:'center'});
    L(dateVN(new Date().toISOString()),{size:17,align:'center'});
    return this._canvas(lines,width);
  },
  // Canvas cho biên nhận khách qua đêm
  overnightCanvas(r,width){
    const s=TS.settings||{}; const lines=[]; const L=(t,o)=>{o=o||{};o.text=t;o.t='text';lines.push(o);};
    const HR=()=>lines.push({t:'hr'});
    const tot=ovTotal(r);
    L((s.bizName||'NHÀ TRỌ').toUpperCase(),{size:30,bold:true,align:'center'});
    if(s.bizPhone)L('ĐT: '+s.bizPhone,{size:18,align:'center'});
    L('BIÊN NHẬN THUÊ PHÒNG',{size:22,bold:true,align:'center'});
    HR();
    L('Phòng: '+(r.roomName||'—'),{size:22,bold:true});
    if(r.guestName)L('Khách: '+r.guestName,{size:20});
    if(r.occupants)L('Số người: '+r.occupants,{size:19});
    L('Nhận: '+ovDT(r.checkIn),{size:19});
    if(r.checkOut)L('Trả:  '+ovDT(r.checkOut),{size:19});
    HR();
    const modeL=r.mode==='hour'?'giờ':'đêm';
    L((r.mode==='hour'?'Theo giờ':'Qua đêm'),{size:22,bold:true});
    L('  '+fmt(r.qty||1)+' '+modeL+' x '+fmt(r.unitPrice||0),{size:20,right:fmt((r.unitPrice||0)*(r.qty||1))});
    if(r.surcharge>0)L('Phụ thu',{size:20,right:fmt(r.surcharge)});
    if(r.discount>0)L('Giảm giá',{size:20,right:'-'+fmt(r.discount)});
    L('TỔNG',{size:29,bold:true,right:fmt(tot)});
    if(r.paid>0)L('Đã thu',{size:20,right:fmt(r.paid)});
    L('CÒN LẠI',{size:25,bold:true,right:fmt(Math.max(0,tot-(r.paid||0)))});
    HR();
    L('Cảm ơn quý khách!',{size:22,align:'center'});
    L(dateVN(new Date().toISOString()),{size:17,align:'center'});
    return this._canvas(lines,width);
  },
  async printBluetooth(buildFn){
    if(!this.supported()){ toast('Máy này không hỗ trợ in Bluetooth (chỉ Android + Chrome).','warn'); return; }
    if(!this.bt.char){ const ok=await this.connect(); if(!ok)return; }
    try{ const W=(localStorage.getItem('tro_paper')==='80')?576:384;
      const r=buildFn.call(this,W); const cmd=this.raster(r.mono,r.width,r.height);
      toast('Đang in…'); await this.write(cmd); toast('Đã gửi lệnh in ✓','ok');
    }catch(e){ toast('In lỗi — thử kết nối lại máy in.','err'); this.bt.server=null; this.bt.char=null; }
  },
  // Bảng chọn cách in (dark) — browserFn: hàm in qua trình duyệt; buildFn: hàm dựng canvas nhiệt
  menu(title,browserFn,buildFn){
    if(document.getElementById('ptMenu'))return;
    const paper=(localStorage.getItem('tro_paper')==='80')?'80':'58';
    const btName=localStorage.getItem('tro_bt_name')||'';
    const conn=this.bt.char?('Đã kết nối: '+(this.bt.name||btName)):'Chưa kết nối';
    const ov=document.createElement('div'); ov.id='ptMenu';
    ov.style.cssText='position:fixed;inset:0;z-index:100000;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:center';
    const c=document.createElement('div');
    c.style.cssText='background:var(--bg-2,#12201B);color:var(--text,#EAF2EE);width:100%;max-width:460px;border-radius:18px 18px 0 0;padding:18px 16px 24px;border:1px solid var(--line,#264034);border-bottom:none;box-shadow:0 -10px 40px rgba(0,0,0,.5)';
    c.innerHTML=
      '<div style="width:40px;height:4px;background:var(--line-2,#2F4C3E);border-radius:3px;margin:0 auto 14px"></div>'+
      '<div style="font-weight:800;font-size:17px;margin-bottom:14px;text-align:center">'+title+'</div>'+
      '<button id="ptBrowser" style="width:100%;text-align:left;background:rgba(69,176,143,.12);border:1.5px solid var(--jade-dim,#2E8368);color:var(--jade,#45B08F);border-radius:12px;padding:13px 15px;margin-bottom:10px;cursor:pointer;font-family:inherit"><span style="font-weight:700;font-size:15px">🖨️ In qua trình duyệt</span><br><span style="font-size:12px;opacity:.85">Máy in WiFi / AirPrint / lưu PDF. Chạy mọi máy, kể cả iPhone.</span></button>'+
      '<button id="ptBt" style="width:100%;text-align:left;background:rgba(201,162,75,.12);border:1.5px solid var(--gold,#C9A24B);color:var(--gold,#C9A24B);border-radius:12px;padding:13px 15px;margin-bottom:12px;cursor:pointer;font-family:inherit"><span style="font-weight:700;font-size:15px">📶 In máy in Bluetooth (nhiệt)</span><br><span style="font-size:12px;opacity:.85">Máy in nhiệt Bluetooth. Chỉ Android + Chrome. '+conn+'.</span></button>'+
      '<div style="display:flex;align-items:center;gap:8px;margin:6px 2px 12px;font-size:13px;color:var(--text-2,#A9BEB4)">Khổ giấy:'+
        '<button id="ptP58" style="border:1px solid var(--line,#264034);border-radius:8px;padding:6px 12px;background:'+(paper==='58'?'var(--jade,#45B08F)':'transparent')+';color:'+(paper==='58'?'#06120E':'var(--text-2,#A9BEB4)')+';cursor:pointer;font-family:inherit">58mm</button>'+
        '<button id="ptP80" style="border:1px solid var(--line,#264034);border-radius:8px;padding:6px 12px;background:'+(paper==='80'?'var(--jade,#45B08F)':'transparent')+';color:'+(paper==='80'?'#06120E':'var(--text-2,#A9BEB4)')+';cursor:pointer;font-family:inherit">80mm</button></div>'+
      '<button id="ptConn" style="width:100%;background:transparent;border:1px solid var(--gold,#C9A24B);color:var(--gold,#C9A24B);border-radius:10px;padding:10px;margin-bottom:10px;font-size:13px;cursor:pointer;font-family:inherit">🔗 Kết nối / đổi máy in Bluetooth</button>'+
      '<button id="ptClose" style="width:100%;background:var(--bg-3,#172A23);border:1px solid var(--line,#264034);color:var(--text,#EAF2EE);border-radius:10px;padding:11px;font-size:14px;cursor:pointer;font-family:inherit">Đóng</button>';
    ov.appendChild(c); document.body.appendChild(ov);
    const close=()=>ov.remove();
    ov.addEventListener('click',e=>{ if(e.target===ov)close(); });
    c.querySelector('#ptClose').onclick=close;
    c.querySelector('#ptP58').onclick=()=>{ try{localStorage.setItem('tro_paper','58');}catch(e){} close(); PT.menu(title,browserFn,buildFn); };
    c.querySelector('#ptP80').onclick=()=>{ try{localStorage.setItem('tro_paper','80');}catch(e){} close(); PT.menu(title,browserFn,buildFn); };
    c.querySelector('#ptConn').onclick=async()=>{ await PT.connect(); close(); PT.menu(title,browserFn,buildFn); };
    c.querySelector('#ptBrowser').onclick=()=>{ close(); if(browserFn)browserFn(); };
    c.querySelector('#ptBt').onclick=()=>{ close(); PT.printBluetooth(buildFn); };
  }
};

/* Mở bảng in cho HÓA ĐƠN tiền phòng */
function ptInvoiceMenu(id){ const inv=DB.byId('invoices',id); if(!inv){toast('Không thấy hóa đơn','err');return;}

/* ---------- (B) KHÁCH QUA ĐÊM ---------- */
function ovTotal(r){ return Math.round((r.unitPrice||0)*(r.qty||1)+(r.surcharge||0)-(r.discount||0)); }
function ovDT(v){ if(!v)return '—'; const d=new Date(v); if(isNaN(d))return v;
  const p=n=>String(n).padStart(2,'0');
  return p(d.getDate())+'/'+p(d.getMonth()+1)+'/'+d.getFullYear()+' '+p(d.getHours())+':'+p(d.getMinutes()); }
function ovNowLocal(){ const d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset());
  return d.toISOString().slice(0,16); }

function viewOvernight(v){
  const all=DB.all('overnight').slice().sort((a,b)=>(b.checkIn||'').localeCompare(a.checkIn||''));
  const staying=all.filter(r=>r.status!=='out');
  const history=all.filter(r=>r.status==='out');
  $('#topActions').innerHTML=`<button class="btn btn-primary btn-sm" onclick="editOvernight()">+ Khách qua đêm</button>`;
  const card=r=>{ const tot=ovTotal(r),rem=Math.max(0,tot-(r.paid||0));
    return `<div class="card" style="padding:13px 15px;margin:10px 0">
      <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start">
        <div>
          <div style="font-weight:800;font-size:15px">${esc(r.roomName||'—')} ${r.status==='out'?'<span class="badge-s b-ok">Đã trả</span>':'<span class="badge-s b-gold">Đang ở</span>'}</div>
          <div style="font-size:13px;color:var(--text-2);margin-top:2px">${esc(r.guestName||'Khách lẻ')}${r.occupants?(' · '+r.occupants+' người'):''}</div>
          <div style="font-size:12.5px;color:var(--text-3);margin-top:3px">🕐 ${ovDT(r.checkIn)}${r.checkOut?(' → '+ovDT(r.checkOut)):''}</div>
        </div>
        <div style="text-align:right">
          <div class="gold" style="font-weight:800;font-size:16px">${fmt(tot)}đ</div>
          <div style="font-size:12px;color:${rem>0?'var(--danger)':'var(--jade)'}">${rem>0?('Còn '+fmt(rem)+'đ'):'Đã thu đủ'}</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">
        ${r.status!=='out'?`<button class="btn btn-sm btn-primary" onclick="checkoutOvernight('${r.id}')">🏁 Trả phòng</button>`:''}
        <button class="btn btn-sm btn-gold" onclick="printOvernight('${r.id}')">🖨️ In biên nhận</button>
        <button class="btn btn-sm btn-ghost" onclick="editOvernight('${r.id}')">Sửa</button>
        <button class="btn btn-sm btn-danger" onclick="delOvernight('${r.id}')">Xóa</button>
      </div></div>`; };
  v.innerHTML=`
    <div class="grid g2" style="margin-bottom:14px">
      <div class="stat" style="--accent:rgba(201,162,75,.14)"><div class="ic-top gold">🛏</div><div class="lbl">Đang ở</div><div class="val">${staying.length}</div></div>
      <div class="stat" style="--accent:var(--danger-bg)"><div class="ic-top ${staying.reduce((a,r)=>a+Math.max(0,ovTotal(r)-(r.paid||0)),0)>0?'down':''}">💰</div><div class="lbl">Chưa thu (đang ở)</div><div class="val">${fmtShort(staying.reduce((a,r)=>a+Math.max(0,ovTotal(r)-(r.paid||0)),0))}</div></div>
    </div>
    <h3 class="section-title">Đang ở (${staying.length})</h3>
    ${staying.length?staying.map(card).join(''):'<div class="empty" style="padding:20px"><p>Chưa có khách qua đêm nào. Bấm <b>+ Khách qua đêm</b>.</p></div>'}
    ${history.length?`<h3 class="section-title" style="margin-top:20px">Lịch sử (${history.length})</h3>${history.slice(0,50).map(card).join('')}`:''}`;
}

async function saveOvernight(id){

    guestName:($('#ovGuest').value||'').trim(), occupants:parseNum($('#ovOcc').value)||1,
    cccd:($('#ovCccd').value||'').trim(), phone:($('#ovPhone').value||'').trim(), plate:($('#ovPlate').value||'').trim(),
    checkIn:$('#ovIn').value||ovNowLocal(), checkOut,
    mode:$('#ovMode').value, qty:parseNum($('#ovQty').value)||1, unitPrice:parseNum($('#ovPrice').value),
    surcharge:parseNum($('#ovSur').value), discount:parseNum($('#ovDisc').value), paid:parseNum($('#ovPaid').value),
    note:($('#ovNote').value||'').trim(), status:checkOut?'out':'in' };
  if(id){ const old=DB.byId('overnight',id); if(old&&old.createdAt)obj.createdAt=old.createdAt; if(old&&old.status==='out'&&!checkOut)obj.status='out'; }

  catch(e){ toast('Lỗi lưu','err'); }
}

/* ================= TrọSafe v2 — Auth + License + Renew + Admin + Boot ================= */

/* ⚙️ CẤU HÌNH BÁN HÀNG — chủ phần mềm chỉnh tại đây */
const ADMIN_EMAIL = 'cuahangminhtri1@gmail.com';   // email admin (chủ phần mềm)
const TRIAL_DAYS  = 15;                            // số ngày dùng thử miễn phí
const RENEW_PRICE = 50000;                         // giá mặc định 1 tháng (đồng) — admin đổi được
let   BILLING     = null;                           // nạp từ billing/info nếu admin đã cấu hình

const F = () => window.FB;
function isAdmin(){ try{ return (F().auth.currentUser?.email||'').toLowerCase()===ADMIN_EMAIL; }catch(e){ return false; } }

/* ═════════ GIẤY PHÉP RIÊNG TỪNG APP ═════════
   Kho dữ liệu TrọSafe có tiền tố tro_ (COL_PREFIX) ⇒ Firestore Rules map về app 'tro'. */
const MA_APP = 'tro';                                              // mã app NÀY
const licRef = (uid, app) => F().doc(F().db,'accounts',uid,'lic',app);
let   LICMAP = {};                                                 // admin: { uid: { tro:{...} } }
function _terr(m){ try{toast(m,'err');}catch(e){alert(m);} }

/* ═══════════ [VÁ v2.1] BỘ CÔNG CỤ GIA HẠN THỐNG NHẤT ═══════════
   Sửa: khoá/mở khoá khách cũ · duyệt đúng app · giá riêng từng app ·
   chống bấm đúp · hiện mã lỗi · sổ doanh thu. */
const _DOC=(...a)=>F().doc(F().db,...a), _COLL=(...a)=>F().collection(F().db,...a), _CG=(n)=>F().collectionGroup(F().db,n),
      _SET=(...a)=>F().setDoc(...a), _GET=(...a)=>F().getDoc(...a), _GETS=(...a)=>F().getDocs(...a),
      _ADD=(...a)=>F().addDoc(...a), _DEL=(...a)=>F().deleteDoc(...a), _SRV=()=>F().serverTimestamp();
async function _ask(m){ try{ return await confirmDlg({title:m,danger:true,okText:'Đồng ý'}); }catch(e){ return window.confirm(m); } }
const APP_IDS=['sono','sono_pos','tro','cafe'];
const APP_TEN={sono:'Sổ Nợ',sono_pos:'Bán hàng (POS)',tro:'TrọSafe',cafe:'Cafe'};
const MY_APPS=['tro'];
let _REQS=[], _EMAILS={}, _admBusy=false;
function _esc2(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function _vnd(n){return Number(n||0).toLocaleString('vi-VN')+'đ';}
function _dts(ts){if(!ts)return'';const d=ts.toDate?ts.toDate():new Date(ts);if(isNaN(d))return'';return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();}
function _ms(ts){if(!ts)return 0;if(typeof ts==='number')return ts;if(ts.toMillis)return ts.toMillis();const d=ts.toDate?ts.toDate():new Date(ts);return isNaN(d)?0:d.getTime();}
function _ec(e){return String((e&&(e.code||e.message))||'lỗi không rõ');}
function _permHint(e){return (e&&e.code==='permission-denied')?' — Firestore Rules CHƯA cập nhật, hãy dán firestore.rules mới (xem Báo cáo).':'';}
function priceFor(app){var B=BILLING||{};
  if(app==='sono')return (B.priceSono>0?B.priceSono:(B.pricePerMonth>0?B.pricePerMonth:10000));
  if(app==='sono_pos')return (B.pricePos>0?B.pricePos:(B.posPricePerMonth>0?B.posPricePerMonth:0));
  if(app==='tro')return (B.priceTro>0?B.priceTro:(B.price>0?B.price:50000));
  if(app==='cafe')return (B.priceCafe>0?B.priceCafe:(B.pricePerMonth>0?B.pricePerMonth:10000));
  return 0;}
function normReq(id,x){x=x||{};var uid=x.uid,app=x.app||'';
  if(id.indexOf('__')>-1){var p=id.split('__');uid=uid||p[0];app=app||p[1]||'';}else{uid=uid||id;}
  if(APP_IDS.indexOf(app)===-1)app='';
  return {reqId:id,uid:uid,app:app,months:Number(x.months)||1,amount:Number(x.amount)||0,email:x.email||''};}
function _pendingFor(uid,app){for(var i=0;i<_REQS.length;i++){var q=_REQS[i];
  if(q.uid===uid&&(q.app===app||(q.app===''&&app===MA_APP)))return q.reqId;}return '';}
async function markReqDone(reqId){ if(!reqId)return;
  try{ await _SET(_DOC('renewalRequests',reqId),{status:'done',handledAt:_SRV()},{merge:true}); }catch(e){} }
window.adminGrantApp=async function(uid,months,app,reqId){
  if(_admBusy)return; _admBusy=true;
  try{
    months=[1,3,6,12].indexOf(Number(months))>-1?Number(months):1;
    app=APP_IDS.indexOf(app)>-1?app:MA_APP;
    if(!reqId)reqId=_pendingFor(uid,app);
    var base=Date.now();
    var snap=await _GET(licRef(uid,app));
    if(snap.exists()){var a=snap.data();
      if(a.paidUntil){var u=a.paidUntil.toDate?a.paidUntil.toDate():new Date(a.paidUntil);
        if(!isNaN(u)&&u.getTime()>base)base=u.getTime();}}
    else{ try{var s0=await _GET(_DOC('accounts',uid));
      if(s0.exists()){var a0=s0.data();var lg=(app==='sono_pos')?a0.posUntil:a0.paidUntil;
        if(a0.migrated!==true&&lg){var u0=lg.toDate?lg.toDate():new Date(lg);
          if(!isNaN(u0)&&u0.getTime()>base)base=u0.getTime();}}
    }catch(e){} }
    var until=new Date(base+months*30*86400000);
    await _SET(licRef(uid,app),{active:true,trial:false,trialUsed:true,paidUntil:until,updatedAt:_SRV(),updatedBy:'admin'},{merge:true});
    await markReqDone(reqId);
    try{ await _ADD(_COLL('payments'),{uid:uid,email:_EMAILS[uid]||'',app:app,months:months,amount:priceFor(app)*months,at:_SRV(),src:reqId?'duyet':'tay'}); }catch(e){}
    toast('✅ Đã gia hạn '+(APP_TEN[app]||app)+' +'+months+' tháng · hạn mới: '+_dts(until));
    window.loadAdminList();
  }catch(e){ console.error('grant',e); _terr('❌ Không gia hạn được ['+_ec(e)+']'+_permHint(e)); }
  finally{ _admBusy=false; }
};
window.adminUnlockApp=async function(uid,app){
  if(_admBusy)return; _admBusy=true;
  try{ app=APP_IDS.indexOf(app)>-1?app:MA_APP;
    var snap=await _GET(licRef(uid,app)); var d=snap.exists()?snap.data():null;
    if(d && !('paidUntil' in d) && d.trialUsed!==true){ await _DEL(licRef(uid,app)); }
    else{ await _SET(licRef(uid,app),{active:true,updatedAt:_SRV()},{merge:true}); }
    toast('🔓 Đã mở khoá'); window.loadAdminList();
  }catch(e){ console.error(e); _terr('❌ Không mở khoá được ['+_ec(e)+']'+_permHint(e)); }
  finally{ _admBusy=false; }
};
window.adminUnlock=function(uid){ return window.adminUnlockApp(uid,MA_APP); };
window.loadAdminList=async function(){
  const box=$('#admin-list'); if(!box)return;
  box.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted,#9ab0a6)">Đang tải...</div>';
  try{
    const r=await Promise.all([_GETS(_COLL('signups')),_GETS(_COLL('accounts')),

        +'<div style="font-weight:700;color:var(--gold,#d9b36a);margin-bottom:8px">📥 Yêu cầu gia hạn đang chờ ('+_REQS.length+')</div>'

          return '<div style="background:var(--bg-2,rgba(255,255,255,.05));border:1px solid var(--line,rgba(255,255,255,.14));border-radius:10px;padding:10px 12px;margin:8px 0">'
            +'<div style="font-weight:600;word-break:break-all;color:var(--text,#e9efe9)">'+_esc2(em)+'</div>'
            +'<div style="font-size:.85em;color:var(--gold,#d9b36a);margin:3px 0 8px">Xin <b>'+tenApp+'</b> · <b>'+q.months+' tháng</b> · '+money+'</div>'
            +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
            +'<button onclick="adminGrantApp(\''+q.uid+'\','+q.months+',\''+target+'\',\''+q.reqId+'\')" style="border:none;border-radius:8px;padding:7px 11px;font-size:.85em;font-weight:700;cursor:pointer;background:#2d9e5f;color:#fff">✅ Duyệt '+(APP_TEN[target]||target)+' +'+q.months+'th</button>'
            +'<button onclick="adminDismissReq(\''+q.reqId+'\')" style="border:none;border-radius:8px;padding:7px 11px;font-size:.85em;font-weight:700;cursor:pointer;background:rgba(255,255,255,.12);color:var(--text,#e9efe9)">Ẩn</button>'
            +'</div></div>';}).join('')
        +'</div>';
    }
    if(!rows.length){box.innerHTML=reqHtml+'<div style="padding:20px;text-align:center;color:var(--muted,#9ab0a6)">Chưa có khách nào đăng ký.</div>';return;}

        +'<div style="font-weight:600;word-break:break-all;color:var(--text,#e9efe9)">'+_esc2(r2.email)+(myReq?' <span style="color:var(--gold,#d9b36a);font-size:.8em">📥 đang xin gia hạn</span>':'')+'</div>'

window.adminActivate=async function(uid,days){
  if(_admBusy)return;
  if(!days){ if(!(await _ask('Cấp VĨNH VIỄN cho khách này? (không còn hạn sử dụng)')))return; }
  _admBusy=true;
  try{
    const data={active:true,trial:false,trialUsed:true,updatedAt:_SRV(),updatedBy:'admin'};
    data.paidUntil = days>0 ? new Date(Date.now()+days*86400000) : null;
    await _SET(licRef(uid,MA_APP),data,{merge:true});
    await markReqDone(_pendingFor(uid,MA_APP));
    try{ await _ADD(_COLL('payments'),{uid:uid,email:_EMAILS[uid]||'',app:MA_APP,months:0,amount:0,note:days>0?(days+' ngày'):'vĩnh viễn',at:_SRV(),src:'tay'}); }catch(e){}

    window.loadAdminList();
  }catch(e){console.error(e);_terr('❌ Không bật được ['+_ec(e)+']'+_permHint(e));}
  finally{_admBusy=false;}
};

/* ---------- Boot (module gọi sau khi Firebase sẵn sàng) ---------- */
window.__startApp = function(){
  wireAuthInputs();
  F().onAuth(F().auth, async (user)=>{
    if(!user){ hideAllScreens(); {const _hf=$('#hotlineFab');if(_hf)_hf.style.display='none';} show('auth-screen'); return; }
    TS.uid = user.uid;
    try{ await F().setDoc(F().doc(F().db,'signups',user.uid),{email:user.email,app:'tro'},{merge:true}); }catch(e){}
    let acc;
    try{ acc = await checkAccount(user.uid); }
    catch(e){ acc={ok:false,reason:'error'}; }
    if(!acc.ok){ hideAllScreens(); {const _hf=$('#hotlineFab');if(_hf)_hf.style.display='none';} showLocked(acc); return; }
    await bootApp(acc);
  });
};

async function bootApp(acc){
  hideAllScreens(); show('app');
  {const _hf=$('#hotlineFab');if(_hf)_hf.style.display=isAdmin()?'none':'flex';}

  catch(e){ toast('Lỗi tải dữ liệu — kiểm tra mạng rồi tải lại','err','Lỗi'); }
  buildSidebarExtras(acc);
  wireNetwork(); updateNetBadge();
  if(acc.trial && acc.until) maybeTrialBanner(acc.until);
  go('dashboard');
}

/* ---------- Đăng nhập / Đăng ký ---------- */
function wireAuthInputs(){
  const pass=$('#pass-input'); if(pass)pass.addEventListener('keydown',e=>{ if(e.key==='Enter')doLogin(); });
}
function authErr(m){ const e=$('#auth-error'); if(e)e.textContent=m||''; }
function authEmail(){ return ($('#email-input').value||'').trim(); }
function authPass(){ return $('#pass-input').value||''; }

async function doLogin(){ const email=authEmail(),pass=authPass();
  if(!email||!pass){ authErr('Nhập email và mật khẩu.'); return; }
  authErr(''); const btn=$('#btn-login'); if(btn){btn.disabled=true;btn.textContent='Đang đăng nhập…';}
  try{ await F().signIn(F().auth,email,pass); }
  catch(e){ authErr(loginErrMsg(e)); }
  finally{ if(btn){btn.disabled=false;btn.textContent='Đăng nhập';} }
}
async function doSignup(){ const email=authEmail(),pass=authPass();
  if(!email||!pass){ authErr('Nhập email và mật khẩu (≥6 ký tự).'); return; }
  if(pass.length<6){ authErr('Mật khẩu tối thiểu 6 ký tự.'); return; }
  authErr(''); const btn=$('#btn-signup'); if(btn){btn.disabled=true;btn.textContent='Đang tạo…';}
  try{ const cred=await F().signUp(F().auth,email,pass);
    try{ await F().setDoc(F().doc(F().db,'signups',cred.user.uid),{email,app:'tro',createdAt:F().serverTimestamp()},{merge:true}); }catch(e){}
    toast('Tạo tài khoản thành công!','ok');
  }catch(e){ authErr(loginErrMsg(e)); }
  finally{ if(btn){btn.disabled=false;btn.textContent='Tạo tài khoản';} }
}
async function doReset(){ const email=authEmail(); if(!email){ authErr('Nhập email để đặt lại mật khẩu.'); return; }
  try{ await F().resetPass(F().auth,email); toast('Đã gửi email đặt lại mật khẩu','ok'); }
  catch(e){ authErr(loginErrMsg(e)); } }
function loginErrMsg(e){ const c=e&&e.code||''; 
  if(c.includes('invalid-credential')||c.includes('wrong-password')||c.includes('user-not-found'))return 'Sai email hoặc mật khẩu.';
  if(c.includes('email-already-in-use'))return 'Email đã được đăng ký. Hãy đăng nhập.';
  if(c.includes('invalid-email'))return 'Email không hợp lệ.';
  if(c.includes('weak-password'))return 'Mật khẩu quá yếu (≥6 ký tự).';
  if(c.includes('network'))return 'Lỗi mạng. Kiểm tra kết nối.';
  return 'Có lỗi, thử lại. ('+c+')'; }
window.doLogin=doLogin; window.doSignup=doSignup; window.doReset=doReset;

/* ---------- License / hạn dùng ---------- */
function _hanInfo(d){
  if(!d)return null;
  if(d.active===false)return{ok:false,reason:'locked'};
  if(d.paidUntil){ const until=d.paidUntil.toDate?d.paidUntil.toDate():new Date(d.paidUntil);
    if(!isNaN(until)&&until.getTime()<Date.now())return{ok:false,reason:'expired',until,trial:!!d.trial};
    return{ok:true,until,trial:!!d.trial}; }
  if(d.active===true)return{ok:true};   // paidUntil rỗng = admin cấp VĨNH VIỄN
  return null;
}
async function checkAccount(uid){
  if(isAdmin())return{ok:true,admin:true};

  // ① GIẤY PHÉP RIÊNG CỦA APP NÀY — accounts/{uid}/lic/tro
  try{
    const L=await F().getDoc(licRef(uid,MA_APP));
    if(L.exists()){ const r=_hanInfo(L.data()); if(r)return r; }
  }catch(e){}

  // ② TƯƠNG THÍCH KHÁCH CŨ — CHỈ khi doc gốc THẬT SỰ mang paidUntil kiểu cũ.
  //    (Doc gốc kiểu MỚI không có paidUntil ⇒ TUYỆT ĐỐI không được coi là "vĩnh viễn".)
  const snap=await F().getDoc(F().doc(F().db,'accounts',uid));
  if(!snap.exists())return{ok:false,reason:'pending'};
  const a=snap.data();
  if(a.migrated===true)return{ok:false,reason:'pending'};   // đã di trú mà chưa có lic ⇒ chưa mua app này
  if(!('paidUntil' in a))return{ok:false,reason:'pending'};
  const r=_hanInfo(a);
  return r||{ok:false,reason:'pending'};
}

  // ① Doc gốc: TUYỆT ĐỐI không được chứa paidUntil (Rules mới cấm — hạn nằm ở lic/)

        {email:(F().auth.currentUser&&F().auth.currentUser.email)||'',createdAt:F().serverTimestamp()});

  // ② Giấy phép dùng thử RIÊNG app này. Rules chỉ cho TẠO 1 lần (không update, không delete)

  try{ const until=new Date(Date.now()+TRIAL_DAYS*86400000);
